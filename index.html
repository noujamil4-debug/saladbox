<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>36 Burger Street | القائمة الرسمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #1a1a1a; --card: #222; --gold: #D4AF37; --accent: #ff9f1c; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg); color: white; overflow-x: hidden; }

        /* الواجهة الرئيسية */
        #home-view {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(rgba(26, 26, 26, 0.9), rgba(26, 26, 26, 0.9)), 
                        url('https://images.unsplash.com/photo-1571091718767-18b5b1457add?q=80&w=1920') center/cover;
        }
        .logo-main {
            width: 170px; height: 170px; border-radius: 50%; border: 4px solid var(--gold);
            background: url('https://i.postimg.cc/cLPjm2br/e62a4436040657-570d2baa45a2b.jpg') center/cover;
            box-shadow: 0 0 40px var(--gold); margin-bottom: 25px;
        }
        h1 { font-family: 'Playfair Display'; font-size: 3rem; color: var(--gold); margin-bottom: 35px; }
        .btn-open { background: var(--gold); color: #000; padding: 20px 60px; font-size: 1.6rem; font-weight: 900; border-radius: 50px; cursor: pointer; border: 3px solid white; transition: 0.3s; }

        /* المنيو */
        #menu-view { display: none; padding: 30px 5%; background: var(--bg); }
        .menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--gold); padding-bottom: 15px; }
        .cat-title { font-size: 1.6rem; color: var(--gold); margin: 40px 0 20px; border-right: 5px solid var(--gold); padding-right: 15px; font-weight: 900; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--card); border-radius: 25px; overflow: hidden; border: 1px solid #333; text-align: center; transition: 0.3s; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        .price { color: var(--accent); font-size: 1.6rem; font-weight: 900; margin-bottom: 15px; display: block; }
        .btn-order { background: var(--gold); color: #000; border: none; width: 100%; padding: 12px; border-radius: 12px; font-weight: 900; cursor: pointer; }

        /* مودال الطلب */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; border: 1px solid var(--gold); }
        input, select { width: 100%; padding: 14px; margin-bottom: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; }
        .btn-gps { background: #4285F4; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- الواجهة -->
    <div id="home-view">
        <div class="logo-main"></div>
        <h1>36 BURGER STREET</h1>
        <div class="btn-open" onclick="openMenu()">فتح الخزانة 🍔</div>
    </div>

    <!-- المنيو -->
    <div id="menu-view">
        <div class="menu-header">
            <button onclick="closeMenu()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 15px; border-radius:5px;">← رجوع</button>
            <h2 style="color:var(--gold)">قائمة الطعام</h2>
        </div>

        <!-- TACOS -->
        <div class="cat-title">TACOS</div>
        <div class="grid">
            <div class="card">
                <img src="https://i.postimg.cc/6Qvdr1k3/french-tacos-with-grilled-chicken-cut-french-tacos-close-up-on-black-background-delicious-french-tac.jpg">
                <div class="card-body"><h3>TACOS CHIKEN</h3><span class="price">350 DA</span><button class="btn-order" onclick="order('Tacos Chiken')">طلب الآن</button></div>
            </div>
            <div class="card">
                <img src="https://i.postimg.cc/fLgDMBbf/french-tacos-with-chicken-popcorn-cut-french-tacos-close-up-on-black-background-delicious-french-tac.jpg">
                <div class="card-body"><h3>TACOS CRISPY</h3><span class="price">470 DA</span><button class="btn-order" onclick="order('Tacos Crispy')">طلب الآن</button></div>
            </div>
            <div class="card">
                <img src="https://i.postimg.cc/HsNc699G/authentic-french-tacos.jpg">
                <div class="card-body"><h3>TACOS BEEF</h3><span class="price">390 DA</span><button class="btn-order" onclick="order('Tacos Beef')">طلب الآن</button></div>
            </div>
        </div>

        <!-- FAJITAS -->
        <div class="cat-title">FAJITAS</div>
        <div class="grid" style="justify-content: center;">
            <div class="card" style="max-width:350px; border: 2px solid var(--gold);">
                <img src="https://i.postimg.cc/hvSy3Bnr/3569.jpg">
                <div class="card-body"><h3>FAJITAS POULET</h3><span class="price">250 DA</span><button class="btn-order" onclick="order('Fajitas Poulet')">طلب الآن</button></div>
            </div>
        </div>

        <!-- SANDWICHES -->
        <div class="cat-title">SANDWICHES</div>
        <div class="grid">
            <div class="card">
                <img src="https://i.postimg.cc/8zK2JwWL/Crispy-Strips-Western-San638669275205899268.jpg">
                <div class="card-body"><h3>SANDWICH POULET</h3><span class="price">370 DA</span><button class="btn-order" onclick="order('Sandwich Poulet')">طلب الآن</button></div>
            </div>
            <div class="card">
                <img src="https://i.postimg.cc/TwF2VfDq/plat-traditionnel-nouvelle-orleans-isole-fond-transparent-893571-44245.jpg">
                <div class="card-body"><h3>SANDWICH CRISPY</h3><span class="price">490 DA</span><button class="btn-order" onclick="order('Sandwich Crispy')">طلب الآن</button></div>
            </div>
            <div class="card">
                <img src="https://i.postimg.cc/05ML6p2J/delicious-grilled-sandwich-with-fresh-vegetables-and-meat-in-transparent-background-free-png.png">
                <div class="card-body"><h3>SANDWICH BEEF</h3><span class="price">450 DA</span><button class="btn-order" onclick="order('Sandwich Beef')">طلب الآن</button></div>
            </div>
        </div>
    </div>

    <!-- نافذة الطلب -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <h2 id="orderTitle" style="text-align:center; color:var(--gold); margin-bottom:20px;">تأكيد الطلب</h2>
            <input type="text" id="name" placeholder="الاسم الكامل">
            <input type="tel" id="phone" placeholder="رقم الهاتف">
            <select id="area">
                <option value="">بلدية التوصيل</option>
                <option value="Sidi Yahia">سيدي يحيا</option>
                <option value="Val d'Hydra">فال ديدرا</option>
                <option value="Dely Ibrahim">ديلي براهيم</option>
            </select>
            <button class="btn-gps" onclick="getLoc()"><i class="fas fa-location-arrow"></i> تحديد موقعي GPS</button>
            <input type="hidden" id="gpsLink">
            <button class="btn-open" style="width:100%; font-size:1.2rem; padding:15px;" onclick="send()">إرسال الطلب 🍔</button>
            <button onclick="document.getElementById('orderModal').style.display='none'" style="background:none; color:gray; width:100%; border:none; margin-top:15px;">إلغاء</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5h3Luj1fmPBkZHJ9VukwA",
            projectId: "saladbox-f541b",
            appId: "1:326812021021:web:2253e938ca143537fcf1f4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function openMenu() { document.getElementById('home-view').style.display='none'; document.getElementById('menu-view').style.display='block'; window.scrollTo(0,0); }
        function closeMenu() { document.getElementById('home-view').style.display='flex'; document.getElementById('menu-view').style.display='none'; }
        
        let itemSelected = "";
        function order(n) { itemSelected = n; document.getElementById('orderTitle').innerText = n; document.getElementById('orderModal').style.display='flex'; }
        
        function getLoc() { if(navigator.geolocation) { navigator.geolocation.getCurrentPosition(p => { document.getElementById('gpsLink').value = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`; alert("تم تحديد الموقع!"); }); } }

        function send() {
            const n = document.getElementById('name').value;
            const p = document.getElementById('phone').value;
            const a = document.getElementById('area').value;
            if(!n || !p || !a) return alert("أكمل البيانات");
            db.collection("orders").add({
                customer: n, phone: p, commune: a, item: itemSelected, 
                googleMaps: document.getElementById('gpsLink').value || "غير محدد",
                status: "جديد", timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => { alert("تم الإرسال بنجاح! 🍔"); document.getElementById('orderModal').style.display='none'; });
        }
    </script>
</body>
                </html>
