<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saladbox | Algeria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- مكتبة Firebase v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --green: #10b981; --black: #000000; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--black); color: white; margin: 0; overflow-x: hidden; }
        
        #splash { position: fixed; inset: 0; background: black; display: flex; align-items: center; justify-content: center; z-index: 5000; transition: 0.8s; }
        .splash-text { color: var(--green); font-size: 5rem; font-weight: 900; font-style: italic; animation: pulse 1.5s infinite; text-transform: uppercase; letter-spacing: -3px; }

        #branch-view { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .card { background: #0a0a0a; border: 1px solid #222; padding: 50px 30px; border-radius: 45px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        #menu-view { display: none; }
        .cat-btn { padding: 10px 25px; border-radius: 40px; font-weight: 700; color: #555; white-space: nowrap; transition: 0.3s; }
        .cat-btn.active { background: var(--green); color: black; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px; }
        input, select { background: #000 !important; border: 1px solid #222 !important; color: white !important; width: 100%; padding: 16px; border-radius: 20px; margin-bottom: 12px; text-align: center; outline: none; appearance: none; }

        /* رسالة النجاح */
        #success-msg { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: black; padding: 15px 30px; border-radius: 50px; font-weight: 900; z-index: 7000; animation: slideDown 0.5s ease; }

        @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.4; transform: scale(0.9); } }
        @keyframes slideDown { from { top: -100px; } to { top: 20px; } }
    </style>
</head>
<body>

    <!-- رسالة النجاح العلويّة -->
    <div id="success-msg text-center">✅ تم إرسال طلبك للمطبخ بنجاح!</div>

    <div id="splash"><h1 class="splash-text">Saladbox</h1></div>

    <div id="branch-view">
        <div class="card" onclick="startApp()">
            <h3 class="text-4xl font-black text-green-500 mb-2 italic uppercase tracking-tighter">Sidi Yahia</h3>
            <p class="text-zinc-500 mb-10 font-bold italic text-sm">سيدي يحيى - الجزائر العاصمة</p>
            <button class="w-full bg-green-500 text-black py-5 rounded-[25px] font-black text-xl shadow-lg">دخول للمنيو</button>
        </div>
    </div>

    <div id="menu-view">
        <div class="p-10 text-center font-black italic text-green-500 text-5xl tracking-tighter uppercase">Saladbox</div>
        <div class="flex gap-2 overflow-x-auto px-6 mb-10 mt-[-20px] relative z-10 no-scrollbar">
            <button onclick="filter('all', this)" class="cat-btn active">الكل</button>
            <button onclick="filter('salads', this)" class="cat-btn">سلطات</button>
            <button onclick="filter('pasta', this)" class="cat-btn">باستا</button>
        </div>
        <main id="grid" class="p-6 grid gap-8 grid-cols-1 md:grid-cols-2 lg:grid-cols-3 max-w-7xl mx-auto pb-32"></main>
    </div>

    <div id="modal" class="modal">
        <div class="bg-[#0a0a0a] border-2 border-green-500 p-10 rounded-[50px] w-full max-w-md">
            <h2 class="text-2xl font-black mb-8 text-center text-green-500 italic uppercase">بيانات الطلب</h2>
            <div id="orderInfo" class="mb-8 text-center bg-black/50 p-6 rounded-3xl font-bold italic text-white text-xl"></div>
            <input id="uName" type="text" placeholder="الاسم الكامل">
            <input id="uPhone" type="tel" placeholder="رقم الهاتف">
            <select id="uCommune">
                <option value="" disabled selected>-- اختر البلدية --</option>
                <option value="Sidi Yahia">Sidi Yahia</option>
                <option value="Hydra">Hydra</option>
                <option value="Draria">Draria</option>
                <option value="El Biar">El Biar</option>
            </select>
            <button id="sendBtn" onclick="sendOrder()" class="w-full bg-green-500 text-black py-5 rounded-[22px] font-black text-xl mt-4 active:scale-95 transition">تأكيد الطلب 📥</button>
            <button onclick="document.getElementById('modal').style.display='none'" class="w-full text-zinc-600 mt-6 font-bold text-sm uppercase">إلغاء</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5h3Luj1fmPBkZHJ9VukwA",
            authDomain: "saladbox-f541b.firebaseapp.com",
            databaseURL: "https://saladbox-f541b-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "saladbox-f541b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        setTimeout(() => { 
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('branch-view').style.display = 'flex';
            }, 800);
        }, 2500);

        function startApp() {
            document.getElementById('branch-view').style.display = 'none';
            document.getElementById('menu-view').style.display = 'block';
            render('all');
        }

        const menu = [
            { id: 1, cat: 'salads', name: 'Chicken Royal', price: 1250, img: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600' },
            { id: 2, cat: 'pasta', name: 'Pesto Pasta', price: 1450, img: 'https://images.unsplash.com/photo-1473093226795-af9932fe5856?w=600' }
        ];

        let selected = null;

        function render(cat) {
            const grid = document.getElementById('grid');
            grid.innerHTML = menu.filter(i => cat === 'all' || i.cat === cat).map(i => `
                <div class="bg-[#0a0a0a] p-5 rounded-[40px] border border-zinc-900 transition hover:border-green-500/30">
                    <img src="${i.img}" class="w-full h-56 object-cover rounded-[30px] mb-6 shadow-2xl">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <h3 class="text-xl font-black italic uppercase tracking-tighter">${i.name}</h3>
                        <span class="bg-green-500 text-black px-4 py-1 rounded-xl font-black text-sm">${i.price} DA</span>
                    </div>
                    <button onclick="openModal(${i.id})" class="w-full bg-green-500 text-black py-4 rounded-2xl font-black text-lg">طلب الوجبة</button>
                </div>
            `).join('');
        }

        function filter(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(cat);
        }

        function openModal(id) {
            selected = menu.find(i => i.id === id);
            document.getElementById('orderInfo').innerHTML = `<h4 class="text-green-500 font-black italic text-2xl">${selected.name}</h4><p class="text-white mt-2">${selected.price} DA</p>`;
            document.getElementById('modal').style.display = 'flex';
        }

        function sendOrder() {
            const name = document.getElementById('uName').value;
            const phone = document.getElementById('uPhone').value;
            const commune = document.getElementById('uCommune').value;

            if(!name || !phone || !commune) return alert("الرجاء إكمال البيانات!");

            // تغيير حالة الزر لمنع الضغط المتكرر
            const btn = document.getElementById('sendBtn');
            btn.innerText = "جاري الإرسال...";
            btn.disabled = true;

            const order = { 
                item: selected.name, 
                price: selected.price, 
                customer: name, 
                phone: phone, 
                address: commune, 
                time: new Date().toLocaleTimeString('ar-DZ') 
            };
            
            // إرسال لـ Firebase (تطبيق العمال) فقط
            db.ref('orders').push(order).then(() => {
                // إظهار رسالة النجاح
                const msg = document.getElementById('success-msg');
                msg.style.display = 'block';
                
                // إغلاق المودال
                document.getElementById('modal').style.display = 'none';
                
                // إعادة الزر لحالته الطبيعية وإخفاء الرسالة بعد 4 ثواني
                setTimeout(() => {
                    msg.style.display = 'none';
                    btn.innerText = "تأكيد الطلب 📥";
                    btn.disabled = false;
                    document.getElementById('uName').value = "";
                    document.getElementById('uPhone').value = "";
                }, 4000);
            }).catch(() => {
                alert("حدث خطأ في الإرسال، حاول مرة أخرى.");
                btn.disabled = false;
                btn.innerText = "تأكيد الطلب 📥";
            });
        }
    </script>
</body>
</html>
