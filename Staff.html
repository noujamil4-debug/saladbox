<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم Saladbox | الإدارة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: white; padding: 15px; }
        .order-card { background: #161616; border-radius: 25px; padding: 20px; border: 1px solid #222; margin-bottom: 15px; }
        .btn-status { font-weight: 900; font-size: 0.7rem; padding: 12px 5px; border-radius: 12px; }
    </style>
</head>
<body>

    <header class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-black text-[#10b981]">إدارة SALADBOX</h1>
        <span id="conn-status" class="text-[9px] text-green-500 font-bold">متصل بالسحاب ●</span>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-[#161616] p-4 rounded-2xl border-b-4 border-white text-center shadow-lg">
            <p class="text-[10px] text-gray-500 font-bold uppercase">الطلبات</p>
            <h2 id="totalOrders" class="text-2xl font-black">0</h2>
        </div>
        <div class="bg-[#161616] p-4 rounded-2xl border-b-4 border-[#10b981] text-center shadow-lg">
            <p class="text-[10px] text-gray-400 font-bold uppercase">إجمالي الأرباح</p>
            <h2 id="totalProfit" class="text-xl font-black text-[#10b981]">0</h2>
        </div>
    </div>

    <div id="list" class="space-y-4 pb-24">
        <p id="loading-msg" class="text-center text-gray-700 mt-20 italic">جاري تحميل الطلبات من السحاب...</p>
    </div>

    <audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <script>
        const config = {
            apiKey: "AIzaSyDfVfaCVOoP_N_J1B6iSmDX4Vf7c3A", 
            databaseURL: "https://legibier-fa574-default-rtdb.firebaseio.com/",
            projectId: "legibier-fa574"
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        // قراءة كل البيانات (القديمة والجديدة)
        db.ref('orders').on('value', (snapshot) => {
            document.getElementById('loading-msg').style.display = 'none';
            const list = document.getElementById('list');
            list.innerHTML = "";
            let count = 0; let profit = 0;

            snapshot.forEach((child) => {
                const o = child.val(); const id = child.key;
                
                // حسابات المدير
                count++;
                profit += parseInt(o.price);

                const html = `
                    <div class="order-card shadow-xl animate__animated animate__fadeIn">
                        <div class="flex justify-between mb-4">
                            <h3 class="text-lg font-black text-white">${o.item}</h3>
                            <span class="text-[9px] bg-[#10b981] text-black px-2 py-0.5 rounded font-black">${o.status}</span>
                        </div>
                        <p class="text-gray-400 text-xs mb-4">الزبون: ${o.customer || 'غير معروف'} | ${o.phone || ''}</p>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="updateStatus('${id}', 'accepted')" class="btn-status bg-blue-600 text-white">تحضير</button>
                            <button onclick="updateStatus('${id}', 'ready')" class="btn-status bg-[#10b981] text-black">إكمال ✅</button>
                            <button onclick="deleteOrder('${id}')" class="btn-status bg-red-800 text-white col-span-2 mt-2">حذف من القائمة 🗑️</button>
                        </div>
                    </div>`;
                list.insertAdjacentHTML('afterbegin', html);
            });

            document.getElementById('totalOrders').innerText = count;
            document.getElementById('totalProfit').innerText = profit.toLocaleString() + " DA";
        });

        // صوت الجرس عند أي إضافة جديدة
        db.ref('orders').on('child_added', (snap, prevKey) => {
            if (prevKey !== null) { // لكي لا يرن على الطلبات القديمة عند فتح الصفحة
                document.getElementById('bell').play().catch(()=>{});
            }
        });

        function updateStatus(id, s) { db.ref('orders/' + id).update({ status: s }); }
        function deleteOrder(id) { if(confirm("هل تريد حذف الطلب نهائياً؟")) db.ref('orders/' + id).remove(); }
    </script>
</body>
</html>
