<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم | 36 Burger Street</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff9f1c; --danger: #e63946; --dark: #0a0a0a; --gray: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { background: var(--dark); color: white; padding-bottom: 50px; }

        /* الشريط العلوي الجديد */
        .admin-top-bar {
            background: #111;
            color: var(--primary);
            padding: 20px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 900;
            border-bottom: 4px solid var(--primary);
            margin-bottom: 30px;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        h1 { text-align: center; margin-bottom: 20px; font-size: 1.6rem; color: #fff; }

        /* زر مسح الكل */
        .admin-tools { display: flex; justify-content: center; margin-bottom: 30px; }
        .btn-delete-all { 
            background: var(--danger); color: white; border: none; padding: 12px 25px; 
            border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(230, 57, 70, 0.3); transition: 0.3s;
        }
        .btn-delete-all:hover { transform: scale(1.05); background: #ff4d5a; }

        /* كارت الطلب - خط كبير وواضح */
        .orders-list { padding: 0 15px; max-width: 800px; margin: 0 auto; }
        .order-card { 
            background: var(--gray); padding: 25px; margin-bottom: 25px; border-radius: 20px; 
            border-right: 10px solid var(--primary); display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        .order-info p { font-size: 1.4rem; margin-bottom: 10px; line-height: 1.6; }
        .order-info b { color: var(--primary); margin-left: 8px; }
        
        .item-name { 
            background: #000; padding: 10px 20px; border-radius: 12px; color: #fff; 
            font-weight: 900; font-size: 1.7rem; display: inline-block; 
            margin-top: 10px; border: 2px solid var(--primary); text-align: center;
        }

        .status-badge { align-self: flex-start; background: var(--primary); color: black; padding: 6px 20px; border-radius: 50px; font-weight: bold; font-size: 1.1rem; }

        .no-orders { text-align: center; color: #666; font-size: 1.6rem; margin-top: 50px; }

        @media (max-width: 600px) {
            .admin-top-bar { font-size: 1.4rem; padding: 15px; }
            .order-info p { font-size: 1.2rem; }
            .item-name { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- الإضافة الجديدة: العنوان في الأعلى -->
    <div class="admin-top-bar">
        36-burger-street - لوحة تحكم
    </div>

    <h1>🍔 مراقبة الطلبات الحية</h1>

    <div class="admin-tools">
        <button class="btn-delete-all" onclick="deleteAllOrders()">
            <i class="fas fa-trash-alt"></i> مسح جميع الطلبيات
        </button>
    </div>

    <div id="liveOrders" class="orders-list">
        <p class="no-orders">جاري جلب الطلبات...</p>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // مفاتيح Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyD5h3Luj1fmPBkZHJ9VukwA",
            authDomain: "saladbox-f541b.firebaseapp.com",
            projectId: "saladbox-f541b",
            appId: "1:326812021021:web:2253e938ca1794776106e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // جلب الطلبات وعرضها
        db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const container = document.getElementById('liveOrders');
            if (snapshot.empty) {
                container.innerHTML = '<p class="no-orders">لا توجد طلبيات حالياً</p>';
                return;
            }
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="order-card">
                        <div class="order-info">
                            <p><b>👤 الزبون:</b> ${data.customer}</p>
                            <p><b>📞 الهاتف:</b> ${data.phone}</p>
                            <p><b>📍 البلدية:</b> ${data.commune}</p>
                            <p style="text-align:center;"><b>🍔 الطلب:</b><br> <span class="item-name">${data.item}</span></p>
                        </div>
                        <span class="status-badge">${data.status || 'جديد'}</span>
                    </div>
                `;
            });
        });

        // وظيفة مسح جميع الطلبات
        async function deleteAllOrders() {
            const confirmAction = confirm("⚠️ هل أنت متأكد من مسح جميع الطلبات نهائياً؟");
            if (confirmAction) {
                try {
                    const snapshot = await db.collection("orders").get();
                    const batch = db.batch();
                    snapshot.docs.forEach((doc) => batch.delete(doc.ref));
                    await batch.commit();
                    alert("✅ تم تنظيف القائمة بنجاح!");
                } catch (error) {
                    alert("❌ خطأ: " + error.message);
                }
            }
        }
    </script>
</body>
</html>
