<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | 36 Burger Street</title>
    
    <!-- الخطوط الفاخرة -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg: #121212; /* أسود فاتح فاخر */
            --card-bg: #1e1e1e;
            --gold: #D4AF37;
            --success: #2ecc71;
            --danger: #e63946;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg); color: white; padding-bottom: 50px; }

        /* الهيدر العلوي */
        .admin-header {
            background: #000;
            padding: 25px;
            text-align: center;
            border-bottom: 3px solid var(--gold);
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .admin-header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        /* أدوات التحكم */
        .tools {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            padding: 0 15px;
        }

        .btn-clear {
            background: var(--danger);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        /* حاوية الطلبات */
        .orders-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .order-card {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            border-right: 10px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        /* ستايل الطلب المكتمل */
        .order-card.ready {
            border-right-color: var(--success);
            opacity: 0.7;
        }

        /* تكبير الخط للبيانات */
        .info-row { margin-bottom: 15px; }
        .info-row p { font-size: 1.3rem; line-height: 1.6; }
        .info-row b { color: var(--gold); margin-left: 10px; }

        .item-box {
            background: #000;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid var(--gold);
            margin: 15px 0;
        }

        .item-box span {
            font-size: 1.7rem;
            font-weight: 900;
            color: white;
        }

        /* الأزرار */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-action {
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-maps { background: #4285F4; color: white; text-decoration: none; }
        .btn-ready { background: var(--success); color: white; }
        
        .ready-status {
            color: var(--success);
            font-weight: 900;
            font-size: 1.5rem;
            text-align: center;
            display: none;
        }

        .ready .ready-status { display: block; }
        .ready .btn-ready { display: none; }

        .empty-msg { text-align: center; color: #666; font-size: 1.5rem; margin-top: 100px; }
    </style>
</head>
<body>

    <div class="admin-header">
        <h1>36-BURGER-STREET - لوحة التحكم</h1>
    </div>

    <div class="tools">
        <button class="btn-clear" onclick="deleteAllOrders()">
            <i class="fas fa-trash-alt"></i> مسح جميع الطلبيات
        </button>
    </div>

    <div id="ordersList" class="orders-container">
        <p class="empty-msg">جاري تحميل الطلبات الحية...</p>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyD5h3Luj1fmPBkZHJ9VukwA",
            authDomain: "saladbox-f541b.firebaseapp.com",
            projectId: "saladbox-f541b",
            storageBucket: "saladbox-f541b.appspot.com",
            messagingSenderId: "326812021021",
            appId: "1:326812021021:web:2253e938ca1794776106e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // جلب الطلبات وعرضها تلقائياً
        db.collection("orders").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const container = document.getElementById('ordersList');
            if (snapshot.empty) {
                container.innerHTML = '<p class="empty-msg">لا توجد طلبات جديدة حالياً</p>';
                return;
            }
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const isReady = data.status === "تم التجهيز";
                
                let mapsBtn = "";
                if (data.googleMaps && data.googleMaps !== "غير محدد") {
                    mapsBtn = `<a href="${data.googleMaps}" target="_blank" class="btn-action btn-maps">
                                <i class="fas fa-map-marked-alt"></i> فتح موقع الزبون على الخريطة
                               </a>`;
                }

                container.innerHTML += `
                    <div class="order-card ${isReady ? 'ready' : ''}">
                        <div class="info-row">
                            <p><b>👤 الزبون:</b> ${data.customer}</p>
                            <p><b>📞 الهاتف:</b> <a href="tel:${data.phone}" style="color:white; text-decoration:none;">${data.phone}</a></p>
                            <p><b>📍 المنطقة:</b> ${data.commune}</p>
                        </div>
                        <div class="item-box">
                            <span>${data.item}</span>
                        </div>
                        <div class="actions">
                            ${mapsBtn}
                            <button class="btn-action btn-ready" onclick="markAsReady('${doc.id}')">
                                <i class="fas fa-check-circle"></i> تم تجهيز الطلبية
                            </button>
                            <p class="ready-status"><i class="fas fa-check-double"></i> الطلبية جاهزة للتوصيل</p>
                        </div>
                    </div>
                `;
            });
        }, (error) => {
            console.error("Error fetching orders: ", error);
            document.getElementById('ordersList').innerHTML = '<p class="empty-msg" style="color:red">خطأ في الاتصال بقاعدة البيانات</p>';
        });

        // وظيفة تغيير الحالة لـ "تم التجهيز"
        function markAsReady(orderId) {
            db.collection("orders").doc(orderId).update({
                status: "تم التجهيز"
            }).catch(err => alert("حدث خطأ: " + err));
        }

        // وظيفة مسح جميع الطلبات
        async function deleteAllOrders() {
            const confirmAction = confirm("⚠️ هل أنت متأكد من مسح القائمة بالكامل؟");
            if (confirmAction) {
                try {
                    const snapshot = await db.collection("orders").get();
                    const batch = db.batch();
                    snapshot.docs.forEach(doc => batch.delete(doc.ref));
                    await batch.commit();
                    alert("تم تنظيف القائمة بنجاح!");
                } catch (err) {
                    alert("خطأ في الحذف: " + err);
                }
            }
        }
    </script>
</body>
</html>
